<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Phiếu Cân</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: "Arial", Times, serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 1000px;
            background: #fff;
            margin: 0 auto;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: block;
        }
        .form-panel {
            width: 100%;
            margin-bottom: 20px;
        }
        .preview-panel {
            text-align: center;
            background: #eaeded;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
        }
        h2, h3 {
            color: #2c3e50;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 6px;
            margin-top: 10px;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 12px;
            display: block;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 15px;
            font-family: "Arial", Times, serif;
        }
        /* Cấu trúc dòng linh hoạt cho Mobile */
        .row-flex {
            display: block;
        }
        .col-50 {
            width: 100%;
            margin-bottom: 10px;
        }
        .row-table-custom {
            background: #f8f9fa;
            padding: 10px;
            border: 1px dashed #bdc3c7;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        
        /* Giao diện trên máy tính / màn hình rộng */
        @media (min-width: 600px) {
            body { padding: 20px; }
            .container { padding: 25px; }
            .row-flex { display: table; width: 100%; table-layout: fixed; }
            .col-50 { display: table-cell; padding-right: 10px; vertical-align: top; }
            .col-50:last-child { padding-right: 0; }
            .row-table-custom { display: table; width: 100%; table-layout: fixed; }
            .col-33 { display: table-cell; padding-right: 8px; vertical-align: top; }
            .col-33:last-child { padding-right: 0; }
        }

        .btn-action {
            background-color: #e67e22;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            font-family: "Arial", Times, serif;
            display: block;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-action:hover { background-color: #d35400; }
        .btn-pdf { background-color: #2980b9; margin-top: 8px;}
        .btn-pdf:hover { background-color: #1f618d; }
        
        #previewCanvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #7f8c8d;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            margin-top: 5px;
        }
        .status-box {
            background-color: #d3f9d8;
            padding: 10px;
            border: 1px solid #b2f2bb;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #2b8a3e;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-panel">
        <h2>THÔNG TIN PHIẾU CÂN</h2>
        
        <div class="status-box">
            <strong>💡 PHIẾU CÂN 2:</strong>
        </div>
        
        <div class="form-group">
            <label style="color: #2980b9;">Tên khách hàng (Tự động theo Biển số):</label>
            <input type="text" id="clientName" placeholder="Tên khách hàng hoặc Biển số xe...">
        </div>

        <div class="form-group">
            <label>Ngày cân (Ngày vào):</label>
            <input type="text" id="dateIn" placeholder="VD: 15/07/2026">
        </div>

        <h3>Chi tiết Mặt hàng & Phương tiện</h3>
        
        <div class="row-flex">
            <div class="col-50">
                <div class="form-group">
                    <label style="color: #2980b9;">Số xe (Biển số):</label>
                    <input type="text" id="truckPlate" placeholder="VD: 15C-133.97" oninput="syncTruckPlate()">
                </div>
            </div>
            <div class="col-50">
                <div class="form-group">
                    <label>Số container:</label>
                    <input type="text" id="containerNo" placeholder="VD: SZLU9077726">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Tên mặt hàng:</label>
            <input type="text" id="cargoType" placeholder="VD: Linh kiện điện tử">
        </div>

        <div class="row-table-custom">
            <div class="col-33">
                <div class="form-group">
                    <label>KL Tổng (kg):</label>
                    <input type="text" id="weightGross" placeholder="VD: 50,000" oninput="handleWeightInput(this)">
                </div>
            </div>
            <div class="col-33">
                <div class="form-group">
                    <label>KL Bì (kg):</label>
                    <input type="text" id="weightTare" placeholder="VD: 20,000" oninput="handleWeightInput(this)">
                </div>
            </div>
            <div class="col-33">
                <div class="form-group">
                    <label>KL Hàng:</label>
                    <input type="text" id="weightNet" placeholder="Kết quả..." readonly style="background: #e9ecef; font-weight: bold; color: #d35400;">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Tiền cân xe (VNĐ):</label>
            <input type="text" id="priceService" value="150,000" placeholder="VD: 150,000" oninput="formatCurrencyInput(this)">
        </div>

        <button type="button" class="btn-action" onclick="drawTextOnImage()">🔄 CẬP NHẬT ẢNH XEM TRƯỚC</button>
        <button type="button" class="btn-action btn-pdf" onclick="exportToJPG()">💾 TẢI FILE ẢNH (.JPG)</button>
    </div>

    <div class="preview-panel">
        <h3 style="border:none; margin: 0 0 5px 0; font-size: 16px;">HÌNH ẢNH KẾT QUẢ XEM TRƯỚC</h3>
        <canvas id="previewCanvas"></canvas>
        <p style="font-size: 12px; color: #7f8c8d; margin-top: 8px; margin-bottom: 0;">Mẹo: Nhấn trực tiếp vào ảnh trên màn hình để xem tọa độ (X, Y).</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const imgPhoi = new Image();

    imgPhoi.src = 'phieucan2.jpeg';

    imgPhoi.onload = function() {
        canvas.width = imgPhoi.width;
        canvas.height = imgPhoi.height;
        ctx.drawImage(imgPhoi, 0, 0);

        // Lấy tọa độ khi chạm/click trên ảnh
        canvas.addEventListener('click', function(event) {
            const rect = canvas.getBoundingClientRect();
            const xClick = Math.round((event.clientX - rect.left) * (canvas.width / rect.width));
            const yClick = Math.round((event.clientY - rect.top) * (canvas.height / rect.height));
            alert("Tọa độ ô này là: X = " + xClick + ", Y = " + yClick);
        });
    };

    function formatNumberString(val) {
        let num = val.replace(/[^0-9]/g, '');
        if (!num) return '';
        return num.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function handleWeightInput(inputElement) {
        const selectionStart = inputElement.selectionStart;
        const oldLength = inputElement.value.length;
        inputElement.value = formatNumberString(inputElement.value);
        const newLength = inputElement.value.length;
        inputElement.setSelectionRange(selectionStart + (newLength - oldLength), selectionStart + (newLength - oldLength));
        tinhKhoiLuongHang();
    }

    function formatCurrencyInput(inputElement) {
        const selectionStart = inputElement.selectionStart;
        const oldLength = inputElement.value.length;
        inputElement.value = formatNumberString(inputElement.value);
        const newLength = inputElement.value.length;
        inputElement.setSelectionRange(selectionStart + (newLength - oldLength), selectionStart + (newLength - oldLength));
    }

    function tinhKhoiLuongHang() {
        const grossRaw = document.getElementById('weightGross').value;
        const grossVal = grossRaw.replace(/,/g, '');
        const tareVal = document.getElementById('weightTare').value.replace(/,/g, '');

        if (grossRaw.trim() === "") {
            document.getElementById('weightNet').value = '';
            return;
        }

        const gross = parseFloat(grossVal) || 0;
        const tare = parseFloat(tareVal) || 0;
        const net = gross - tare;

        if (net > 0) {
            document.getElementById('weightNet').value = net.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        } else {
            document.getElementById('weightNet').value = '0';
        }
    }

    function syncTruckPlate() {
        const plate = document.getElementById('truckPlate').value;
        document.getElementById('clientName').value = plate;
    }

    function drawTextOnImage() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(imgPhoi, 0, 0);

        // Cài đặt font chữ Times New Roman thanh lịch, tiệp màu chữ in kim thực tế
        ctx.fillStyle = '#0f1a24';
        ctx.font = '60px "Arial"'; 

        const clientName = document.getElementById('clientName').value;
        const dateIn = document.getElementById('dateIn').value;
        const truckPlate = document.getElementById('truckPlate').value;
        const containerNo = document.getElementById('containerNo').value;
        const cargoType = document.getElementById('cargoType').value;
        const weightGross = document.getElementById('weightGross').value;
        const weightTare = document.getElementById('weightTare').value;
        const weightNet = document.getElementById('weightNet').value;
        const priceService = document.getElementById('priceService').value;

        // --- CĂN CHỈNH TỌA ĐỘ CHỮ THEO PHÔI ẢNH THỰC TẾ ---
        // Phần thông tin chung
        if(dateIn) ctx.fillText(dateIn, 2400, 769.5);
        if(clientName) ctx.fillText(clientName, 777, 1068);

        // Phần bảng thông tin các cột hàng
        if(cargoType) ctx.fillText(cargoType, 410, 1460);
        if(truckPlate) ctx.fillText(truckPlate, 840, 1460);
        if(containerNo) ctx.fillText(containerNo, 1300, 1460);
        
        // Căn phải cho các cột số để thẳng hàng số liệu
        ctx.textAlign = "right";
        if(weightGross) ctx.fillText(weightGross, 1920, 1460);
        if(weightTare) ctx.fillText(weightTare, 2250, 1460);
        if(weightNet) ctx.fillText(weightNet, 2595, 1460);
        if(priceService) ctx.fillText(priceService, 3090, 1460);
        
        // Reset lại định dạng textAlign về mặc định sau khi vẽ xong
        ctx.textAlign = "left";
    }

    function exportToJPG() {
        drawTextOnImage();
        const link = document.createElement('a');
        link.download = 'Phieu_Can_Vo.jpg';
        link.href = canvas.toDataURL('image/jpeg', 1.0); 
        link.click();
    }
</script>
</body>
</html>
