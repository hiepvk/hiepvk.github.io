<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ghi đè chữ vào PDF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
  <h2>Chèn chữ vào PDF</h2>
  <input type="file" id="upload" accept="application/pdf">
  <br><br>
  <label>Tên chủ hàng: <input type="text" id="goodsOwner"></label><br>
  <label>Địa chỉ: <input type="text" id="address"></label><br><br>
  <button onclick="processPDF()">Xuất PDF mới</button>

  <script>
    async function processPDF() {
      const fileInput = document.getElementById("upload");
      if (!fileInput.files.length) {
        alert("Vui lòng chọn file PDF trước");
        return;
      }

      const arrayBuffer = await fileInput.files[0].arrayBuffer();
      const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);

      const pages = pdfDoc.getPages();
      const firstPage = pages[0];

      const goodsOwner = document.getElementById("goodsOwner").value;
      const address = document.getElementById("address").value;

      // Thêm chữ vào vị trí mong muốn (tọa độ x,y)
      firstPage.drawText("Tên chủ hàng: " + goodsOwner, {
        x: 100,
        y: 500,
        size: 12
      });
      firstPage.drawText("Địa chỉ: " + address, {
        x: 100,
        y: 480,
        size: 12
      });

      const pdfBytes = await pdfDoc.save();
      const blob = new Blob([pdfBytes], { type: "application/pdf" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "KhaiBaoYTe_GhiDe.pdf";
      link.click();
    }
  </script>
</body>
</html>
