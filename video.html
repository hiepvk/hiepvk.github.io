<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clip Thể Dục</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #1a1a1a; color: white; display: flex; justify-content: center; 
            padding: 10px; margin: 0; 
        }
        .container { 
            display: flex; flex-direction: column; width: 100%; max-width: 1100px; 
            gap: 15px; background: #333; padding: 15px; border-radius: 15px; 
        }

        /* Responsive cho PC: Nằm ngang / Mobile: Nằm dọc */
        @media (min-width: 769px) {
            .container { flex-direction: row; align-items: flex-start; }
        }

        .video-wrapper { flex: 2; position: relative; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; display: block; aspect-ratio: 16/9; }

        }

        /* ĐIỀU CHỈNH DANH SÁCH TẠI ĐÂY */
        .playlist { 
            flex: 1; background: #222; border-radius: 12px; 
            overflow: hidden; /* Để bo góc hoạt động tốt */
            height: auto; /* Cho phép giãn theo nội dung */
            min-height: 300px; /* Chiều cao tối thiểu */
        }
        .playlist h3 { 
            padding: 18px; margin: 0; background: #111; 
            font-size: 1.2rem; border-bottom: 1px solid #444; 
        }
        .video-item { 
            padding: 18px 15px; border-bottom: 1px solid #333; 
            cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center;
        }
        .video-item:last-child { border-bottom: none; }
        .video-item.active { background: #007bff; }
        .video-item p { margin: 0; font-size: 1rem; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper" id="video-container">
        <video id="video-player" controls playsinline webkit-playsinline>
            <source id="video-source" src="https://github.com/hiepvk/ipa/releases/download/video/video1.mp4" type="video/mp4">
        </video>
    </div>

    <div class="playlist">
        <h3>Danh sách Clip</h3>
        <div class="video-item active" onclick="playVideo('https://github.com/hiepvk/ipa/releases/download/video/video1.mp4', this)">
            <p>01. Clip 01</p>
        </div>
        <div class="video-item" onclick="playVideo('https://github.com/hiepvk/ipa/releases/download/video/video2.mp4', this)">
            <p>02. Clip 02</p>
        </div>
        <div class="video-item" onclick="playVideo('https://github.com/hiepvk/ipa/releases/download/video/video3.mp4', this)">
            <p>03. Clip 03</p>
        </div>
    </div>
</div>

<script>
    const videoContainer = document.getElementById('video-container');
    const videoPlayer = document.getElementById('video-player');
    const videoSource = document.getElementById('video-source');

    function playVideo(fileUrl, element) {
        videoSource.src = fileUrl;
        videoPlayer.load();
        videoPlayer.play().catch(e => console.log("User interaction required"));

        document.querySelectorAll('.video-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
    }

    function toggleFullScreen() {
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.webkitDisplayingFullscreen;
        if (!isFullscreen) {
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen();
            } else if (videoContainer.webkitRequestFullscreen) {
                videoContainer.webkitRequestFullscreen();
            } else if (videoPlayer.webkitEnterFullscreen) {
                videoPlayer.webkitEnterFullscreen();
            }
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    }

    videoPlayer.onended = function() {
        let activeItem = document.querySelector('.video-item.active');
        let nextItem = activeItem.nextElementSibling;
        if (nextItem && nextItem.classList.contains('video-item')) nextItem.click();
    };
</script>

</body>
</html>
