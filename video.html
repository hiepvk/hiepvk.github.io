<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Video Player với Nút Toàn Màn Hình</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { display: flex; width: 100%; max-width: 1100px; gap: 20px; background: #333; padding: 15px; border-radius: 12px; }
        
        /* Khung chứa video và nút tùy chỉnh */
        .video-wrapper { flex: 2; position: relative; background: #000; border-radius: 8px; overflow: hidden; height: fit-content; }
        video { width: 100%; display: block; }

        /* Nút Toàn màn hình tùy chỉnh */
        .fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 123, 255, 0.8);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            z-index: 10;
            transition: 0.3s;
        }
        .fullscreen-btn:hover { background: #0056b3; }

        .playlist { flex: 1; background: #222; border-radius: 8px; overflow-y: auto; max-height: 450px; }
        .playlist h3 { padding: 15px; margin: 0; border-bottom: 1px solid #444; }
        .video-item { padding: 12px 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .video-item.active { background: #007bff; }
        .video-item p { margin: 0; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper" id="video-container">
        <video id="video-player" controls playsinline>
            <source id="video-source" src="https://github.com/hiepvk/ipa/releases/download/video/video1.mp4" type="video/mp4">
        </video>
        <!-- Nút thêm vào -->
        <button class="fullscreen-btn" onclick="toggleFullScreen()">Toàn màn hình ⛶</button>
    </div>

    <div class="playlist">
        <h3>Danh sách bài học</h3>
        <div class="video-item active" onclick="playVideo('https://github.com/hiepvk/ipa/releases/download/video/video1.mp4', this)">
            <p>01. Video Bài Một</p>
        </div>
        <div class="video-item" onclick="playVideo('https://github.com/hiepvk/ipa/releases/download/video/video2.mp4', this)">
            <p>02. Video Bài Hai</p>
        </div>
    </div>
</div>

<script>
    const videoContainer = document.getElementById('video-container');
    const videoPlayer = document.getElementById('video-player');

    // Hàm điều khiển toàn màn hình
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            // Phóng to toàn bộ khung chứa (bao gồm cả nút và video)
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen();
            } else if (videoContainer.webkitRequestFullscreen) { 
                videoContainer.webkitRequestFullscreen();
            } else if (videoContainer.msRequestFullscreen) {
                videoContainer.msRequestFullscreen();
            }
        } else {
            // Thoát chế độ toàn màn hình
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    function playVideo(fileUrl, element) {
        const videoSource = document.getElementById('video-source');
        videoSource.src = fileUrl;
        videoPlayer.load();
        videoPlayer.play();

        document.querySelectorAll('.video-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
    }

    // Tự động chuyển bài
    videoPlayer.onended = function() {
        let activeItem = document.querySelector('.video-item.active');
        let nextItem = activeItem.nextElementSibling;
        if (nextItem && nextItem.classList.contains('video-item')) {
            nextItem.click();
        }
    };
</script>

</body>
</html>
